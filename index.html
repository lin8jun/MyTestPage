  <meta name="theme-color" content="#000A1B">

  <script>
    // 运行时根据构建后的真实哈希文件名生成 manifest，避免 MD5 缓存后路径失效
    (function () {
      var runtimeKey = "__CC_PWA_RUNTIME__";
      var icon192Link = document.getElementById("cc-pwa-icon-192");
      var icon512Link = document.getElementById("cc-pwa-icon-512");
      var swLink = document.getElementById("cc-pwa-sw");
      var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      var themeMeta = document.querySelector('meta[name="theme-color"]');
      var scopeUrl = new URL("index.47b2b.js/", window.location.href);
      var startUrl = new URL("./index.html", window.location.href);
      var appTitle = titleMeta && titleMeta.content ? titleMeta.content : (document.title || "slot_portrait_hall");
      var themeColor = themeMeta && themeMeta.content ? themeMeta.content : "#000A1B";
      var icons = [];

      if (icon192Link && icon192Link.href) {
        icons.push({
          src: icon192Link.href,
          sizes: "192x192",
          type: "image/webp",
          purpose: "any maskable"
        });
      }

      if (icon512Link && icon512Link.href) {
        icons.push({
          src: icon512Link.href,
          sizes: "512x512",
          type: "image/webp",
          purpose: "any maskable"
        });
      }

      var manifest = {
        id: scopeUrl.href,
        name: appTitle,
        short_name: appTitle,
        start_url: startUrl.href,
        scope: scopeUrl.href,
        display: "standalone",
        display_override: ["standalone", "minimal-ui", "browser"],
        background_color: themeColor,
        theme_color: themeColor,
        icons: icons
      };

      var manifestBlob = new Blob(
        [JSON.stringify(manifest)],
        { type: "application/manifest+json" }
      );
      var manifestUrl = URL.createObjectURL(manifestBlob);
      var manifestLink = document.createElement("link");
      manifestLink.id = "cc-pwa-manifest-runtime";
      manifestLink.rel = "manifest";
      manifestLink.href = manifestUrl;
      document.head.appendChild(manifestLink);

      window[runtimeKey] = {
        manifestUrl: manifestUrl,
        serviceWorkerUrl: swLink && swLink.href ? swLink.href : "",
        scopeUrl: scopeUrl.href,
        startUrl: startUrl.href
      };
    })();
  </script>

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      position: fixed; overflow: hidden;
      -webkit-overflow-scrolling: touch;
      user-select: none; -webkit-user-select: none;
      background-color: #000A1B; 
    }
    #GameDiv { width: 100%; height: 100%; }

    /* ========= loading style ========== */
    #loading-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000A1B;
        z-index: 9999;
        display: block; 
    }

    .loading-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        margin-top: clamp(100px, calc(206 / 750 * 100vw), 206px);
        font-family: Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 100;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
        text-shadow:
            0 0 5px #fff,
            0 0 10px #ff00ff,
            0 0 15px #ff00ff,
            0 0 20px #ff00ff,
            0 0 30px #ffd700,
            0 0 40px #ffd700;
        animation: pulseNeon 1.8s infinite;
        white-space: nowrap; 
    }

    .loading-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); 
        width: calc(476 / 750 * 100vw);
        max-width: 476px; 
        max-height: 371px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 3px #a855f7) drop-shadow(0 0 6px #a855f7);
        opacity: 0;
        animation: logoFadeIn 2.8s ease forwards;
        margin: 0; 
    }

    @keyframes logoFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes pulseNeon {
        0% { opacity: 0.6; text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ffd700; }
        50% { opacity: 1; text-shadow: 0 0 7px #fff, 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 50px #ffd700; }
        100% { opacity: 0.6; text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ffd700; }
    }
  </style>
