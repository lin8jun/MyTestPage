  <script>
    (function() {
      function getTemDId() {
        const timestamp = Date.now().toString();
        const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        var randomStr = "";
        for (let i = 0; i < 64; i++) {
            randomStr += chars[Math.floor(Math.random() * chars.length)];
        }
        var raw = randomStr + timestamp;
        var hash = 0;
        for (let i = 0; i < raw.length; i++) {
            hash = (hash << 5) - hash + raw.charCodeAt(i);
            hash |= 0;
        }
        var deviceId = (randomStr + Math.abs(hash).toString(16)).slice(0, 64).toLowerCase();
        return deviceId;
      }

      var temDid;
      try {
        temDid = localStorage.getItem('tem_did');
        if (!temDid) {
          temDid = getTemDId();
          localStorage.setItem('tem_did', temDid);
        }
      } catch (e) {
        temDid = getTemDId();
      }

      var urlParams = new URLSearchParams(window.location.search);
      var session = urlParams.get('session');
      var manifestUrl = new URL("/manifest.webmanifest", window.location.origin);

      manifestUrl.searchParams.set('dId', temDid);
      if (session) {
        manifestUrl.searchParams.set('session', session);
      }

      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestUrl.toString();
      link.crossOrigin = 'use-credentials';
      document.head.appendChild(link);
    })();
  </script>

  <script>
    (function () {
      var FIRST_TARGET = 0.20;
      var DECAY_K = 0.9;
      var _displayed = 0;
      var _firstStart = (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now();
      var _firstDone = false;
      var _engineTookOver = false;

      function applyProgress(p) {
        if (p <= _displayed) return;
        _displayed = p;
        var fill = document.getElementById("progress-fill");
        var text = document.getElementById("progress-text");
        if (fill) fill.style.width = (p * 100).toFixed(1) + "%";
        if (text) text.textContent = (p * 100).toFixed(0) + "%";
      }

      function firstTick() {
        if (_engineTookOver || _firstDone) return;
        if (document.visibilityState !== "hidden") {
          var now = (typeof performance !== "undefined" && performance.now) ? performance.now() : Date.now();
          var t = (now - _firstStart) / 1000;
          var p = FIRST_TARGET * (1 - Math.exp(-DECAY_K * t));
          if (p >= FIRST_TARGET * 0.999) { p = FIRST_TARGET; _firstDone = true; }
          applyProgress(p);
        }
        if (!_firstDone) requestAnimationFrame(firstTick);
      }
      requestAnimationFrame(firstTick);

      window.CCLoadingBridge = {
        setProgress: function (progress) {
          if (progress > FIRST_TARGET) _engineTookOver = true;
          applyProgress(Math.min(progress, 1));
        },
        onComplete: function () {
          var mask = document.getElementById("loading-mask");
          if (mask) {
            setTimeout(function () { mask.style.display = "none"; }, 350);
          }
        },
        reset: function () {
          _displayed = 0;
          _engineTookOver = true;
          _firstDone = true;
          var fill = document.getElementById("progress-fill");
          var text = document.getElementById("progress-text");
          if (fill) fill.style.width = "0%";
          if (text) text.textContent = "0%";
          var mask = document.getElementById("loading-mask");
          if (mask) mask.style.display = "block";
        }
      };
    })();
  </script>
  <script>
    (function () {
      const ORIENTATION_EVENT_NAME = "cc-orientation-change";
      let currentOrientationState = null;

      function buildOrientationState() {
        const screenOrientation = window.screen && window.screen.orientation ? window.screen.orientation : null;
        const orientationType = screenOrientation && typeof screenOrientation.type === "string"
          ? screenOrientation.type
          : "";
        const orientationAngle = screenOrientation && typeof screenOrientation.angle === "number"
          ? screenOrientation.angle
          : (typeof window.orientation === "number" ? window.orientation : 0);

        let isPortrait = false;
        let source = "viewport";

        if (orientationType) {
          isPortrait = orientationType.indexOf("portrait") === 0;
          source = "screen.orientation";
        } else if (typeof window.matchMedia === "function") {
          isPortrait = window.matchMedia("(orientation: portrait)").matches;
          source = "matchMedia";
        } else {
          isPortrait = window.innerHeight >= window.innerWidth;
        }

        return {
          isPortrait: isPortrait,
          isLandscape: !isPortrait,
          type: isPortrait ? "portrait" : "landscape",
          rawType: orientationType || (isPortrait ? "portrait" : "landscape"),
          angle: orientationAngle,
          width: window.innerWidth,
          height: window.innerHeight,
          source: source,
          updatedAt: Date.now()
        };
      }

      function emitOrientationChange() {
        currentOrientationState = buildOrientationState();
        window.dispatchEvent(new CustomEvent(ORIENTATION_EVENT_NAME, {
          detail: currentOrientationState
        }));
        return currentOrientationState;
      }

      window.CCOrientationBridge = {
        eventName: ORIENTATION_EVENT_NAME,
        getState: function () {
          return currentOrientationState || emitOrientationChange();
        },
        refresh: function () {
          return emitOrientationChange();
        }
      };

      if (window.screen && window.screen.orientation && typeof window.screen.orientation.addEventListener === "function") {
        window.screen.orientation.addEventListener("change", emitOrientationChange);
      }

      window.addEventListener("orientationchange", emitOrientationChange);
      window.addEventListener("resize", emitOrientationChange);
      window.addEventListener("pageshow", emitOrientationChange);

      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
          emitOrientationChange();
        }
      });

      emitOrientationChange();
    })();
  </script>
