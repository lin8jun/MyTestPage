    .orientation-mask__panel {

    .orientation-mask__icon {

      position: relative;

    }

    .orientation-mask__icon::before {

      top: 8px;
      left: 50%;
      width: 22px;
      height: 3px;

      background: rgba(255, 255, 255, 0.78);

    }

    .orientation-mask__text {

      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }

    @keyframes orientationHintTilt {
      from { transform: rotate(0deg); }
      to { transform: rotate(-90deg); }
    }

    /* ========= loading style ========== */
    #loading-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

    @keyframes logoFadeIn {

  <script>
    (function () {
      const mask = document.getElementById("orientation-mask");
      const gameDiv = document.getElementById("GameDiv");
      const loadingMask = document.getElementById("loading-mask");

      function isLandscapeViewport() {
        return window.innerWidth > window.innerHeight;
      }

      async function tryLockPortrait() {
        try {
          if (screen.orientation && typeof screen.orientation.lock === "function") {
            await screen.orientation.lock("portrait");
          }
        } catch (error) {
          // Most browser tabs will reject orientation lock without standalone/fullscreen context.
        }
      }

      function syncOrientationMask() {
        const showMask = isLandscapeViewport();
        mask.classList.toggle("is-visible", showMask);
        mask.setAttribute("aria-hidden", showMask ? "false" : "true");

        if (gameDiv) {
          gameDiv.style.visibility = showMask ? "hidden" : "visible";
        }

        if (loadingMask) {
          loadingMask.style.visibility = showMask ? "hidden" : "visible";
        }
      }

      window.addEventListener("load", () => {
        syncOrientationMask();
        void tryLockPortrait();
      }, { once: true });
      window.addEventListener("resize", syncOrientationMask);
      window.addEventListener("orientationchange", () => {
        syncOrientationMask();
        void tryLockPortrait();
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          syncOrientationMask();
          void tryLockPortrait();
        }
      });
      document.addEventListener("fullscreenchange", () => {
        syncOrientationMask();
        void tryLockPortrait();
      });

      syncOrientationMask();
    })();
  </script>
